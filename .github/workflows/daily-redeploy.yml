name: Daily Redeploy

on:
  schedule:
    - cron: '0 6 * * *' # Every day at 6am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: curl -X POST "$DEPLOY_HOOK"
